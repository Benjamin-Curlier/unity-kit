name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python3 - <<'EOF'
          import json, pathlib, sys
          bad = []
          for p in pathlib.Path(".").rglob("*.json"):
              if ".git" in p.parts:
                  continue
              try:
                  json.loads(p.read_text(encoding="utf-8"))
              except Exception as e:
                  bad.append(f"{p}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("all JSON valid")
          EOF

      - name: Lint skill/agent/command frontmatter
        run: |
          python3 -m pip install --quiet pyyaml
          python3 - <<'EOF'
          import pathlib, re, sys, yaml
          bad = []
          def frontmatter(p):
              text = p.read_text(encoding="utf-8")
              m = re.match(r"^---\n(.*?)\n---\n", text, re.S)
              return m.group(1) if m else None
          def check(p, required):
              fm = frontmatter(p)
              if fm is None:
                  bad.append(f"{p}: missing frontmatter"); return
              try:
                  data = yaml.safe_load(fm)
              except Exception as e:
                  bad.append(f"{p}: frontmatter is not valid YAML: {e}"); return
              if not isinstance(data, dict):
                  bad.append(f"{p}: frontmatter is not a mapping"); return
              for k in required:
                  if not isinstance(data.get(k), str) or not data[k].strip():
                      bad.append(f"{p}: frontmatter '{k}' missing or not a string")
              # unquoted bracketed hints parse as YAML arrays — a real breakage we shipped once
              if "argument-hint" in data and not isinstance(data["argument-hint"], str):
                  bad.append(f"{p}: argument-hint must be a quoted string (parsed as {type(data['argument-hint']).__name__})")
          for p in pathlib.Path("unity-kit/skills").glob("*/SKILL.md"):
              check(p, ["name", "description"])
          for p in pathlib.Path("unity-kit/agents").glob("*.md"):
              check(p, ["name", "description"])
          for p in pathlib.Path("unity-kit/commands").glob("*.md"):
              check(p, ["description"])
          if bad:
              print("\n".join(bad)); sys.exit(1)
          print("frontmatter OK")
          EOF

      - name: Python hook syntax
        run: python3 -m py_compile unity-kit/hooks/*.py

      - name: Bash script syntax
        run: |
          for f in unity-kit/scripts/*.sh; do bash -n "$f"; done
          echo "bash syntax OK"

      - name: Workflow script syntax
        run: |
          # The Workflow runtime wraps the script body in an async function (top-level
          # return/await are legal there) — replicate that before node --check.
          for f in unity-kit/workflows/*.js; do
            { echo 'async function __wf(args, budget, agent, parallel, pipeline, phase, log, workflow) {'
              sed 's/^export //' "$f"
              echo '}'; } > /tmp/wf-check.mjs
            node --check /tmp/wf-check.mjs || { echo "syntax error in $f"; exit 1; }
          done
          echo "workflow scripts OK"
